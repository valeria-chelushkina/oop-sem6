<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Library Admin Panel</title>
    <link rel="stylesheet" href="static/css/style.css" />
    <link rel="stylesheet" href="static/css/adminManagement.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
    />
    <link
            href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
            rel="stylesheet"
    />
</head>
<body>
<header>
    <div>
        <a href="/"
        ><img
                class="icon"
                src="https://ctfcf--s.chowtaifook.com/wp-content/themes/ctfcf-theme/images/title/en/library.png"
                alt="library-icon"
                title="library-icon"
        /></a>
    </div>
    <form class="search-bar-input" id="search-form" method="get" action="">
        <input
                type="search"
                id="search-bar"
                name="query"
                placeholder="Search..."
                autocomplete="off"
        />
        <button type="submit" class="search-btn">🔎︎</button>
    </form>
    <div id="auth-container"></div>
</header>

<div class="admin-container">

    <!-- sidebar -->
    <aside class="sidebar">
        <h2>Library Admin</h2>
        <nav>
            <ul>
                <li
                        class="nav-item active"
                        data-target="books-section"
                        data-name="Books"
                >
                    📚 Books
                </li>
                <li
                        class="nav-item"
                        data-target="authors-section"
                        data-name="Authors"
                >
                    ✍️ Authors
                </li>
                <li
                        class="nav-item"
                        data-target="book-items-section"
                        data-name="Book items"
                >
                    🆔 Book items
                </li>
                <li class="nav-item" data-target="loans-section" data-name="Loans">
                    🤝 Loans
                </li>
                <li
                        class="nav-item"
                        data-target="genres-section"
                        data-name="Genres"
                >
                    🏷️ Genres
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div class="content-header">
            <h1 id="tab-title">Books management</h1>

            <div class="admin-controls">
                <div class="header-actions">
                <button id="open-add-form">+ Add entry</button>
                <div class="search-box">
                    <input
                        type="text"
                        id="global-search"
                        placeholder="Quick search..."
                    />
                    </div>
                </div>
                <div id="dynamic-filters-container" class="filters-grid"></div>
            </div>

        </div>

        <!-- table with information -->
        <section class="card">
            <table>
                <thead>
                <tr class="table-head"></tr>
                </thead>

                <tbody class="table-body"></tbody>
            </table>

            <div class="pagination">
                <button class="load-more">Load more...</button>
            </div>
        </section>


        <!-- modal windows -->
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-window">
                <header class="modal-header">
                    <h2 id="modal-title"></h2>
                    <button id="close-modal-btn" class="close-btn">&times;</button>
                </header>

                <div class="modal-body">
                    <form id="admin-form">
                    </form>
                </div>

                <footer class="modal-footer">
                    <button type="button" id="cancel-btn" class="close-btn">Cancel</button>
                    <button type="submit" form="admin-form" id="save-btn">
                        Save
                    </button>
                </footer>
            </div>
        </div>


        <!-- modal window for quick add (author\genre\book item) -->
        <div
                id="modal-quick-add"
                class="modal-overlay"
                style="z-index: 1100"
        >
            <div class="modal-window small">
                <header class="modal-header">
                    <h2 id="quick-modal-title">Add new author</h2>
                    <button id="close-quick-modal-btn" class="close-btn">&times;</button>
                </header>

                <div class="modal-body">
                    <form id="quick-admin-form">
                        <div class="form-group">
                            <label> Pen name:</label>
                            <input type="text" id="author-pen-name" required />
                        </div>

                        <div class="form-group">
                            <label> Biography:</label>
                            <textarea name="biography" id="author-biography"></textarea>
                        </div>
                    </form>
                </div>

                <footer class="modal-footer">
                    <button type="button" id="quick-cancel-btn" class="close-btn">Cancel</button>
                    <button type="submit" form="quick-admin-form" id="quick-save-btn">
                        Save
                    </button>
                </footer>
            </div>
        </div>


    </main>
</div>

<!-- for Select2 -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script type="module" src="/static/js/pages/adminManagement.js"></script>
<script src="/static/js/utils/header.js"></script>
</body>
</html>
