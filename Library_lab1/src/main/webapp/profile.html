<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/profile.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
    />
    <title>Profile</title>
</head>
<body>
<header>
    <div>
        <a href="/"
        ><img
                class="icon"
                src="https://ctfcf--s.chowtaifook.com/wp-content/themes/ctfcf-theme/images/title/en/library.png"
                alt="library-icon"
                title="library-icon"
        /></a>
    </div>
    <form class="search-bar-input" id="search-form" method="get" action="">
        <input
                type="search"
                id="search-bar"
                name="query"
                placeholder="Search..."
                autocomplete="off"
        />
        <button type="submit" class="search-btn">🔎︎</button>
    </form>
    <div id="auth-container"></div>
</header>

<div class="main-container">
    <aside class="sidebar">
        <nav>
            <ul id="options-list">
                <li class="profile-nav-item">
                    <a href="/" class="active" id="profile-personal-page">Personal data</a>
                </li>
                <li class="profile-nav-item"><a href="#">Orders</a></li>
            </ul>
        </nav>
    </aside>

    <main class="profile-content">
        <h1>Profile data</h1>

        <div id="profile-data-card">
            <div>
                <label> First name: </label>
                <input type="text" id="user-first-name" />
            </div>
            <div>
                <label> Last name: </label>
                <input type="text" id="user-last-name" />
            </div>
            <div>
                <label> Email: </label>
                <input type="text" id="user-email" readonly />
            </div>
            <div>
                <label> User ID: </label>
                <input type="text" id="user-id" readonly />
            </div>
            <button class="save-changes-btn">Save changes</button>
        </div>
    </main>
</div>

<script type="module" src="/static/js/pages/profile.js"></script>
<script type="module" src="/static/js/utils/header.js"></script>
</body>
</html>
